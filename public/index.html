<!DOCTYPE html>
<html lang="tr" data-tema="karanlik">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#07090f">
    <title>BOOM Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ========== GİRİŞ / KAYIT ========== -->
<div class="ekran aktif" id="girisEkrani">
    <div class="giris-bg"><div class="giris-grid"></div><div class="giris-glow"></div></div>
    <div class="giris-kart">
        <div class="giris-logo">
            <span class="logo-ikon">💥</span>
            <span class="logo-yazi">BOOM</span>
            <span class="logo-chat">chat</span>
        </div>

        <!-- Tab seçici -->
        <div class="auth-tabs">
            <button class="auth-tab aktif" onclick="tabSec('giris')">Giriş Yap</button>
            <button class="auth-tab" onclick="tabSec('kayit')">Kayıt Ol</button>
        </div>

        <!-- GİRİŞ FORMU -->
        <div id="girisForm">
            <div class="form-alan">
                <label class="form-etiket">KULLANICI ADI</label>
                <input type="text" id="girisAdi" class="form-input" placeholder="Kullanıcı adınız"
                    autocomplete="username" autocorrect="off" autocapitalize="off">
            </div>
            <div class="form-alan">
                <label class="form-etiket">ŞİFRE</label>
                <div class="sifre-sarici">
                    <input type="password" id="girisSifre" class="form-input" placeholder="Şifreniz"
                        autocomplete="current-password">
                    <button class="sifre-goster-btn" onclick="sifreGoster('girisSifre')">👁</button>
                </div>
            </div>
            <div class="hata-kutu" id="girisHata"></div>
            <button class="giris-btn" id="girisBtn" onclick="girisYap()">
                <span class="btn-yazi">GİRİŞ YAP</span>
                <span class="btn-ok">→</span>
            </button>
        </div>

        <!-- KAYIT FORMU -->
        <div id="kayitForm" style="display:none">
            <div class="form-alan">
                <label class="form-etiket">KULLANICI ADI</label>
                <input type="text" id="kayitAdi" class="form-input" placeholder="Kullanıcı adı seçin"
                    maxlength="20" autocorrect="off" autocapitalize="off">
            </div>
            <div class="form-alan">
                <label class="form-etiket">ŞİFRE</label>
                <div class="sifre-sarici">
                    <input type="password" id="kayitSifre" class="form-input" placeholder="En az 4 karakter"
                        autocomplete="new-password">
                    <button class="sifre-goster-btn" onclick="sifreGoster('kayitSifre')">👁</button>
                </div>
            </div>
            <div class="form-alan">
                <label class="form-etiket">PROFİL FOTOĞRAFI <span class="opsiyonel">— opsiyonel</span></label>
                <div class="avatar-yukle-alan" onclick="document.getElementById('avatarInput').click()">
                    <div class="avatar-onizleme" id="avatarOnizleme">
                        <span class="avatar-ikon">+</span>
                        <span class="avatar-yazi">Ekle</span>
                    </div>
                </div>
                <input type="file" id="avatarInput" accept="image/*" hidden>
            </div>
            <div class="form-alan">
                <label class="form-etiket">ADMİN KODU <span class="opsiyonel">— adminseniz girin</span></label>
                <input type="text" id="adminKodu" class="form-input" placeholder="Admin kodunuz (opsiyonel)"
                    autocomplete="off" autocorrect="off">
            </div>
            <div class="hata-kutu" id="kayitHata"></div>
            <button class="giris-btn" id="kayitBtn" onclick="kayitOl()">
                <span class="btn-yazi">KAYIT OL</span>
                <span class="btn-ok">→</span>
            </button>
        </div>

        <p class="giris-not">Enter tuşuyla da devam edebilirsiniz</p>
    </div>
</div>

<!-- ========== SOHBET ========== -->
<div class="ekran" id="sohbetEkrani">
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="sidebarKapat()"></div>

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-ust">
            <div class="sidebar-logo">
                <span class="logo-ikon-kucuk">💥</span>
                <span class="sidebar-baslik">BOOM</span>
            </div>
            <div style="display:flex;gap:3px">
                <button class="ikon-btn" title="Tema" onclick="temaDegistir()">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"/>
                        <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                        <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
                    </svg>
                </button>
                <button class="ikon-btn mobil-sidebar-kapat" onclick="sidebarKapat()">✕</button>
            </div>
        </div>

        <div class="sidebar-profil">
            <div class="profil-avatar-kucuk" id="sidebarAvatar">?</div>
            <div class="profil-bilgi">
                <div class="profil-ad" id="sidebarAd">...</div>
                <div class="profil-durum">
                    <span class="online-nokta"></span>
                    <span id="profilRol">Üye</span>
                </div>
            </div>
            <button class="cikis-btn" onclick="cikisYap()" title="Çıkış">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                    <polyline points="16 17 21 12 16 7"/>
                    <line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
            </button>
        </div>

        <!-- ODALAR -->
        <div class="sidebar-bolum">
            <div class="bolum-baslik-satir">
                <span class="bolum-baslik">ODALAR</span>
                <button class="yeni-oda-btn admin-only" id="yeniOdaBtn" onclick="yeniOdaModalAc()" title="Yeni oda">+</button>
            </div>
            <div id="odaListesi"></div>
        </div>

        <!-- DM LİSTESİ -->
        <div class="sidebar-bolum">
            <div class="bolum-baslik">MESAJLAR</div>
            <div class="dm-listesi" id="dmListesi"></div>
        </div>

        <!-- ÇEVRİMİÇİ -->
        <div class="sidebar-bolum sidebar-bolum-flex">
            <div class="bolum-baslik">ÇEVRİMİÇİ — <span id="kullaniciSayisi">0</span></div>
            <div class="kullanici-listesi" id="kullaniciListesi"></div>
        </div>
    </aside>

    <!-- ANA ALAN -->
    <main class="ana-alan">
        <header class="sohbet-header">
            <button class="mobil-menu-btn" onclick="sidebarAc()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="3" y1="6" x2="21" y2="6"/>
                    <line x1="3" y1="12" x2="21" y2="12"/>
                    <line x1="3" y1="18" x2="21" y2="18"/>
                </svg>
            </button>
            <div class="header-baslik" id="headerBaslik">
                <span class="header-ikon">#</span>
                <span id="headerAd">genel</span>
            </div>
            <div class="header-aksiyonlar" id="headerAksiyonlar"></div>
        </header>

        <div class="mesaj-alani" id="mesajAlani">
            <div class="hosgeldin-mesaji">
                <div class="hosgeldin-ikon">💥</div>
                <h2>BOOM Chat'e Hoş Geldiniz!</h2>
                <p>Mesaj göndererek konuşmayı başlatın.</p>
            </div>
        </div>

        <div class="yaziyor-alan" id="yaziyorAlan"></div>

        <footer class="mesaj-footer" id="mesajFooter">
            <div class="foto-onizleme-alan" id="fotoOnizlemeAlan" style="display:none">
                <div class="foto-onizleme-icerik">
                    <img id="fotoOnizlemeImg" src="" alt="">
                    <button class="foto-iptal-btn" onclick="fotoyuIptalEt()">✕</button>
                </div>
            </div>
            <div class="mesaj-input-sarici">
                <button class="foto-ekle-btn" id="fotoEkleBtn"
                    onclick="document.getElementById('fotoInput').click()" disabled>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <polyline points="21 15 16 10 5 21"/>
                    </svg>
                </button>
                <input type="file" id="fotoInput" accept="image/*" hidden>
                <textarea id="mesajInput" class="mesaj-input"
                    placeholder="Bir mesaj yaz..." rows="1" disabled></textarea>
                <button class="gonder-btn" id="gonderBtn" onclick="mesajGonder()" disabled>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <line x1="22" y1="2" x2="11" y2="13"/>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                </button>
            </div>
        </footer>
    </main>

    <!-- SAĞ PANEL -->
    <aside class="sag-panel" id="sagPanel" style="display:none">
        <div id="sagPanelIcerik"></div>
    </aside>
</div>

<!-- ADMİN PANELİ -->
<div class="modal-overlay" id="adminModal" style="display:none" onclick="modalKapat('adminModal')">
    <div class="modal modal-genis" onclick="event.stopPropagation()">
        <div class="modal-baslik">⚡ Admin Paneli</div>
        <div id="adminPanelIcerik"></div>
        <div class="modal-aksiyonlar">
            <button class="modal-btn iptal" onclick="modalKapat('adminModal')">Kapat</button>
        </div>
    </div>
</div>

<!-- BAN MODAL -->
<div class="modal-overlay" id="banModal" style="display:none" onclick="modalKapat('banModal')">
    <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-baslik">🚫 Kullanıcıyı Banla</div>
        <div class="form-alan">
            <label class="form-etiket">BAN SEBEBİ</label>
            <input type="text" id="banSebep" class="form-input" placeholder="Sebep yazın...">
        </div>
        <div class="form-alan">
            <label class="form-etiket">SÜRE (Dakika — 0 = Süresiz)</label>
            <input type="number" id="banSure" class="form-input" value="0" min="0">
        </div>
        <div class="modal-aksiyonlar">
            <button class="modal-btn iptal" onclick="modalKapat('banModal')">İptal</button>
            <button class="modal-btn tehlikeli" id="banOnayBtn">Banla</button>
        </div>
    </div>
</div>

<!-- YENİ ODA MODAL -->
<div class="modal-overlay" id="yeniOdaModal" style="display:none" onclick="modalKapat('yeniOdaModal')">
    <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-baslik">➕ Yeni Oda Oluştur</div>
        <div class="form-alan">
            <label class="form-etiket">ODA ADI</label>
            <input type="text" id="yeniOdaAdi" class="form-input" placeholder="oda-adi (küçük harf)"
                maxlength="20" autocorrect="off" autocapitalize="off">
        </div>
        <div class="form-alan">
            <label class="form-etiket">AÇIKLAMA</label>
            <input type="text" id="yeniOdaAciklama" class="form-input" placeholder="Kısa açıklama...">
        </div>
        <div class="modal-aksiyonlar">
            <button class="modal-btn iptal" onclick="modalKapat('yeniOdaModal')">İptal</button>
            <button class="modal-btn onay" onclick="yeniOdaOlustur()">Oluştur</button>
        </div>
    </div>
</div>

<!-- ENGEL MODAL -->
<div class="modal-overlay" id="engelModal" style="display:none" onclick="modalKapat('engelModal')">
    <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-baslik">Kullanıcıyı Engelle</div>
        <div class="modal-icerik" id="engelModalIcerik"></div>
        <div class="modal-aksiyonlar">
            <button class="modal-btn iptal" onclick="modalKapat('engelModal')">İptal</button>
            <button class="modal-btn tehlikeli" id="engelOnayBtn">Engelle</button>
        </div>
    </div>
</div>

<!-- LİGHTBOX -->
<div class="lightbox" id="lightbox" onclick="lightboxKapat()">
    <div class="lightbox-icerik" onclick="event.stopPropagation()">
        <img id="lightboxImg" src="" alt="">
        <button class="lightbox-kapat" onclick="lightboxKapat()">✕</button>
    </div>
</div>

<div class="toast-kap" id="toastKap"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>
</body>
</html>
