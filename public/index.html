<!DOCTYPE html>
<html lang="tr" data-tema="karanlik">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#090c12">
    <title>BOOM Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ========== GİRİŞ ========== -->
<div class="ekran aktif" id="girisEkrani">
    <div class="giris-bg">
        <div class="giris-grid"></div>
        <div class="giris-glow"></div>
    </div>
    <div class="giris-kart">
        <div class="giris-logo">
            <span class="logo-ikon">💥</span>
            <span class="logo-yazi">BOOM</span>
            <span class="logo-chat">chat</span>
        </div>
        <p class="giris-alt">Gerçek zamanlı mesajlaşma</p>

        <div class="form-alan">
            <label class="form-etiket">KULLANICI ADI</label>
            <input type="text" id="kullaniciAdi" class="form-input"
                placeholder="Adınızı girin..." maxlength="20" autocomplete="off"
                autocorrect="off" autocapitalize="off" spellcheck="false">
        </div>

        <div class="form-alan">
            <label class="form-etiket">FOTOĞRAF <span class="opsiyonel">— opsiyonel</span></label>
            <div class="avatar-yukle-alan" onclick="document.getElementById('avatarInput').click()">
                <div class="avatar-onizleme" id="avatarOnizleme">
                    <span class="avatar-ikon">+</span>
                    <span class="avatar-yazi">Ekle</span>
                </div>
            </div>
            <input type="file" id="avatarInput" accept="image/*" hidden>
        </div>

        <div class="hata-kutu" id="hataMesaji"></div>
        <button class="giris-btn" id="girisBtn" onclick="girisYap()">
            <span class="btn-yazi">KATIL</span>
            <span class="btn-ok">→</span>
        </button>
        <p class="giris-not">Enter ile de giriş yapabilirsiniz</p>
    </div>
</div>

<!-- ========== SOHBET ========== -->
<div class="ekran" id="sohbetEkrani">

    <!-- Sidebar overlay (mobilde arka plan karartma) -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="sidebarKapat()"></div>

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-ust">
            <div class="sidebar-logo">
                <span class="logo-ikon-kucuk">💥</span>
                <span class="sidebar-baslik">BOOM</span>
            </div>
            <div style="display:flex;gap:4px;align-items:center">
                <button class="ikon-btn" title="Tema" onclick="temaDegistir()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"/>
                        <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                        <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                    </svg>
                </button>
                <!-- Mobil kapat butonu -->
                <button class="ikon-btn mobil-sidebar-kapat" onclick="sidebarKapat()">✕</button>
            </div>
        </div>

        <div class="sidebar-profil">
            <div class="profil-avatar-kucuk" id="sidebarAvatar">?</div>
            <div class="profil-bilgi">
                <div class="profil-ad" id="sidebarAd">...</div>
                <div class="profil-durum">
                    <span class="online-nokta"></span>
                    <span>Çevrimiçi</span>
                </div>
            </div>
            <button class="cikis-btn" onclick="cikisYap()" title="Çıkış">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                    <polyline points="16 17 21 12 16 7"/>
                    <line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
            </button>
        </div>

        <div class="sidebar-bolum">
            <div class="bolum-baslik">KANALLAR</div>
            <div class="kanal-item aktif-kanal" id="genelKanal" onclick="kanalSec('genel')">
                <span class="kanal-ikon">#</span>
                <span>genel</span>
                <span class="mesaj-sayaci" id="genelSayac" style="display:none"></span>
            </div>
        </div>

        <div class="sidebar-bolum">
            <div class="bolum-baslik">MESAJLAR</div>
            <div class="dm-listesi" id="dmListesi"></div>
        </div>

        <div class="sidebar-bolum sidebar-bolum-flex">
            <div class="bolum-baslik">ÇEVRİMİÇİ — <span id="kullaniciSayisi">0</span></div>
            <div class="kullanici-listesi" id="kullaniciListesi"></div>
        </div>
    </aside>

    <!-- ANA ALAN -->
    <main class="ana-alan" id="anaAlan">
        <header class="sohbet-header">
            <button class="mobil-menu-btn" onclick="sidebarAc()" aria-label="Menü">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="3" y1="6" x2="21" y2="6"/>
                    <line x1="3" y1="12" x2="21" y2="12"/>
                    <line x1="3" y1="18" x2="21" y2="18"/>
                </svg>
            </button>
            <div class="header-baslik" id="headerBaslik">
                <span class="header-ikon">#</span>
                <span id="headerAd">genel</span>
            </div>
            <div class="header-aksiyonlar" id="headerAksiyonlar"></div>
        </header>

        <div class="mesaj-alani" id="mesajAlani">
            <div class="hosgeldin-mesaji">
                <div class="hosgeldin-ikon">💥</div>
                <h2>BOOM Chat'e Hoş Geldiniz!</h2>
                <p>İlk mesajı gönderin ve konuşmayı başlatın.</p>
            </div>
        </div>

        <div class="yaziyor-alan" id="yaziyorAlan"></div>

        <footer class="mesaj-footer" id="mesajFooter">
            <div class="foto-onizleme-alan" id="fotoOnizlemeAlan" style="display:none">
                <div class="foto-onizleme-icerik">
                    <img id="fotoOnizlemeImg" src="" alt="">
                    <button class="foto-iptal-btn" onclick="fotoyuIptalEt()">✕</button>
                </div>
            </div>
            <div class="mesaj-input-sarici">
                <button class="foto-ekle-btn" id="fotoEkleBtn"
                    onclick="document.getElementById('fotoInput').click()"
                    title="Fotoğraf gönder" disabled>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <polyline points="21 15 16 10 5 21"/>
                    </svg>
                </button>
                <input type="file" id="fotoInput" accept="image/*" hidden>
                <textarea id="mesajInput" class="mesaj-input"
                    placeholder="Bir mesaj yaz..." rows="1" disabled></textarea>
                <button class="gonder-btn" id="gonderBtn" onclick="mesajGonder()" disabled>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <line x1="22" y1="2" x2="11" y2="13"/>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                </button>
            </div>
        </footer>
    </main>

    <!-- SAĞ PANEL (sadece masaüstü) -->
    <aside class="sag-panel" id="sagPanel" style="display:none">
        <div id="sagPanelIcerik"></div>
    </aside>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="engelModal" style="display:none" onclick="modalKapat('engelModal')">
    <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-baslik">Kullanıcıyı Engelle</div>
        <div class="modal-icerik" id="engelModalIcerik"></div>
        <div class="modal-aksiyonlar">
            <button class="modal-btn iptal" onclick="modalKapat('engelModal')">İptal</button>
            <button class="modal-btn tehlikeli" id="engelOnayBtn">Engelle</button>
        </div>
    </div>
</div>

<!-- LİGHTBOX -->
<div class="lightbox" id="lightbox" onclick="lightboxKapat()">
    <div class="lightbox-icerik" onclick="event.stopPropagation()">
        <img id="lightboxImg" src="" alt="">
        <button class="lightbox-kapat" onclick="lightboxKapat()">✕</button>
    </div>
</div>

<div class="toast-kap" id="toastKap"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>
</body>
</html>
